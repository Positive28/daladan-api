name: Deploy on Tag

on:
  push:
    tags:
      - "v*"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${VPS_SSH_KEY}" > ~/.ssh/deploy_key
          tr -d '\r' < ~/.ssh/deploy_key > ~/.ssh/deploy_key_clean
          chmod 600 ~/.ssh/deploy_key_clean
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/deploy_key_clean

      - name: Add server to known hosts
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "${PORT}" -H "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy selected tag over SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          APP_DIR="${VPS_APP_DIR:-/var/www/start-api}"

          ssh -p "${PORT}" "${VPS_USER}@${VPS_HOST}" \
            "APP_DIR='${APP_DIR}' bash '${APP_DIR}/scripts/deploy-tag.sh' '${TAG}'"
